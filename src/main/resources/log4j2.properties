status =  warn
name = APIAutomationLogging

# Appenders
appenders = console, file

# Root Logger Configuration
#rootLogger.level = debug
rootLogger.level = info
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = File

# Console Appender
appender.console.type = Console
appender.console.name = Console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5p %c{1} - %m%n

# Rolling File Appender
appender.file.type = File
appender.file.name = File
appender.file.fileName = ./logs/api-test.log
#appender.file.filePattern = ./logs/api-test-%d{yyyy-MM-dd}.log
appender.file.append = true
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} [%t] %-5p %c{1} - %m%n


appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.time.modulate = true
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 7


# ============================================
# LOGGER CONFIGURATIONS - Suppress noise
# ============================================
 
# Suppress RestAssured request/response logging in console (goes to file instead)
logger.restassured.name = io.restassured
logger.restassured.level = warn
logger.restassured.additivity = false
 
# Suppress TestNG Utils verbose logging
logger.testng.name = org.testng
logger.testng.level = warn
logger.testng.additivity = false
 
# Suppress Groovy logging (used by RestAssured)
logger.groovy.name = groovy
logger.groovy.level = warn
logger.groovy.additivity = false
 
# Your custom application loggers - INFO level
logger.api.name = apiautomation
logger.api.level = info
logger.api.appenderRefs = console, file
logger.api.appenderRef.console.ref = Console
logger.api.appenderRef.file.ref = File
 
 